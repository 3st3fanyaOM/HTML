<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titulo en pestaña</title>
</head>
<body>
    <h1>Cabecera</h1>
    <h1>Cabecera más pequeña</h1>

    <!--DIV-->
    <div style ="display:grid"></div>
    <div style ="width :500px; height: 500px; background : silver;margin:auto">
    <h1  style = "text-align :center; color :red; font-style: italic">Carpe diem</h1>
    <p>Esta expresión puede abordarse </p>
    </div>
 
    <!--Lista sin orden-->
    <ul type ="circle">
        <li>Elemento 1</li>
        <li>Elemento 2</li>
        <li>Elemento 3</li>
        <li>Elemento 4</li>
    </ul>

    <!--Lista ordenada-->

    <ol start="4" reversed>
        <li>1</li>
        <li>2</li>
        <li>3</li>
    </ol>
    <ol type="a" start ="4">
        <li>1</li>
        <li>2</li>
        <li>3</li>
    </ol>

</body>
</html>
